{% extends "base.html" %}

{% block content %}

<h2>Edit Order</h2>

<form method="POST">

<input name="first_name" value="{{order.first_name}}" required><br><br>

<input name="last_name" value="{{order.last_name}}" required><br><br>

<input name="email" value="{{order.email}}" required><br><br>

<input name="phone" value="{{order.phone}}" required><br><br>

<input name="address" value="{{order.address}}" required><br><br>

<input name="city" value="{{order.city}}" required><br><br>

<input name="state" value="{{order.state}}" required><br><br>

<input name="postal" value="{{order.postal}}" required><br><br>

<select name="country">

<option {% if order.country=="United States" %}selected{% endif %}>United States</option>
<option {% if order.country=="Canada" %}selected{% endif %}>Canada</option>
<option {% if order.country=="Australia" %}selected{% endif %}>Australia</option>
<option {% if order.country=="Singapore" %}selected{% endif %}>Singapore</option>
<option {% if order.country=="Hong Kong" %}selected{% endif %}>Hong Kong</option>

</select>

<br><br>

<select name="product">

<option {% if order.product=="Fiber Internet 300 Mbps" %}selected{% endif %}>Fiber Internet 300 Mbps</option>
<option {% if order.product=="5GUnlimited Mobile Plan" %}selected{% endif %}>5GUnlimited Mobile Plan</option>
<option {% if order.product=="Fiber Internet 1 Gbps" %}selected{% endif %}>Fiber Internet 1 Gbps</option>
<option {% if order.product=="Business Internet 500 Mbps" %}selected{% endif %}>Business Internet 500 Mbps</option>
<option {% if order.product=="VoIP Corporate Package" %}selected{% endif %}>VoIP Corporate Package</option>

</select>

<br><br>

<input type="number" name="quantity" value="{{order.quantity}}" min="1"><br><br>

<input type="number" name="unit_price" value="{{order.unit_price}}" step="0.01"><br><br>

<select name="status">

<option {% if order.status=="Pending" %}selected{% endif %}>Pending</option>
<option {% if order.status=="In progress" %}selected{% endif %}>In progress</option>
<option {% if order.status=="Completed" %}selected{% endif %}>Completed</option>

</select>

<br><br>

<select name="created_by">

<option {% if order.created_by=="Mr. Michael Harris" %}selected{% endif %}>Mr. Michael Harris</option>
<option {% if order.created_by=="Mr. Ryan Cooper" %}selected{% endif %}>Mr. Ryan Cooper</option>
<option {% if order.created_by=="Ms. Olivia Carter" %}selected{% endif %}>Ms. Olivia Carter</option>
<option {% if order.created_by=="Mr. Lucas Martin" %}selected{% endif %}>Mr. Lucas Martin</option>

</select>

<br><br>

<button type="submit">Update Order</button>

</form>

{% endblock %}
