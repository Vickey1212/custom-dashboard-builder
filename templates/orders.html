{% extends "base.html" %}
{% block content %}

<h2>Customer Orders</h2>

<a href="/create-order">
<button>Create Order</button>
</a>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Product</th>
<th>Total</th>
<th>Status</th>
<th>Actions</th>
</tr>

{% for o in orders %}

<tr>
<td>{{o.id}}</td>
<td>{{o.first_name}} {{o.last_name}}</td>
<td>{{o.product}}</td>
<td>${{o.total_amount}}</td>
<td>{{o.status}}</td>

<td>

<a href="/edit-order/{{o.id}}">
<button>Edit</button>
</a>

<a href="/delete-order/{{o.id}}">
<button style="background:red">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
