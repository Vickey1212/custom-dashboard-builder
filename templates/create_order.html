{% extends "base.html" %}

{% block content %}

<style>

.form-wrapper{
max-width:950px;
margin:auto;
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.form-title{
font-size:26px;
font-weight:600;
margin-bottom:20px;
color:#1e293b;
}

.section-title{
margin-top:25px;
margin-bottom:10px;
font-weight:600;
color:#475569;
border-bottom:2px solid #f1f5f9;
padding-bottom:5px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-size:14px;
margin-bottom:6px;
color:#475569;
}

input,select{
padding:10px;
border:1px solid #cbd5e1;
border-radius:6px;
font-size:14px;
transition:0.2s;
}

input:focus,select:focus{
border-color:#6366F1;
outline:none;
box-shadow:0 0 5px rgba(99,102,241,0.4);
}

.full{
grid-column:span 2;
}

.submit-btn{
margin-top:25px;
width:100%;
padding:12px;
background:#6366F1;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.submit-btn:hover{
background:#4f46e5;
}

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

}

</style>

<div class="form-wrapper">

<div class="form-title">Create Customer Order</div>

<form method="POST">

<div class="section-title">Customer Information</div>

<div class="form-grid">

<div class="form-group">
<label>First Name</label>
<input name="first_name" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input name="last_name" required>
</div>

<div class="form-group">
<label>Email</label>
<input name="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input name="phone" required>
</div>

<div class="form-group full">
<label>Street Address</label>
<input name="address" required>
</div>

<div class="form-group">
<label>City</label>
<input name="city" required>
</div>

<div class="form-group">
<label>State / Province</label>
<input name="state" required>
</div>

<div class="form-group">
<label>Postal Code</label>
<input name="postal" required>
</div>

<div class="form-group">
<label>Country</label>
<select name="country">

<option>India</option>
<option>United States</option>
<option>Canada</option>
<option>Australia</option>
<option>Singapore</option>
<option>Hong Kong</option>

</select>
</div>

</div>

<div class="section-title">Order Information</div>

<div class="form-grid">

<div class="form-group full">
<label>Choose Product</label>
<select name="product">

<option>Fiber Internet 300 Mbps</option>
<option>5GUnlimited Mobile Plan</option>
<option>Fiber Internet 1 Gbps</option>
<option>Business Internet 500 Mbps</option>
<option>VoIP Corporate Package</option>

</select>
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" name="quantity" value="1" min="1">
</div>

<div class="form-group">
<label>Unit Price ($)</label>
<input type="number" name="unit_price" step="0.01">
</div>

<div class="form-group">
<label>Status</label>
<select name="status">
<option>Pending</option>
<option>In progress</option>
<option>Completed</option>
</select>
</div>

<div class="form-group">
<label>Created By</label>
<select name="created_by">

<option>Mr. Michael Harris</option>
<option>Mr. Ryan Cooper</option>
<option>Ms. Olivia Carter</option>
<option>Mr. Lucas Martin</option>
<option>Mr. Vickey</option>
<option>Mr. R.D.Junior</option>
<option>Mr. Vijay</option>

</select>
</div>

</div>

<button class="submit-btn">Submit Order</button>

</form>

</div>

{% endblock %}
